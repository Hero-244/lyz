<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>2026华中（长沙）疗愈生态博览会 - 展位预订</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #c9a84c;
      --primary-light: #f0e6c8;
      --primary-dark: #8B6914;
      --coral: #c67d4e;
      --text-dark: #3d3426;
      --text-mid: #6b5d4d;
      --text-light: #9a8a78;
      --bg-gradient: linear-gradient(180deg, #fdfbf7 0%, #f5f0e5 50%, #ebe3d4 100%);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      min-height: 100vh;
      background: var(--bg-gradient);
      background-attachment: fixed;
      color: var(--text-dark);
      -webkit-font-smoothing: antialiased;
    }

    .container { max-width: 100%; margin: 0; padding: 0 0 120px 0; }

    /* ====== HERO 主视觉区 ====== */
    .hero {
      position: relative;
      padding: 50px 20px 40px;
      text-align: center;
      background: linear-gradient(135deg, #1a3d2e 0%, #0d1f18 50%, #1a3d2e 100%);
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="none" stroke="rgba(201,168,76,0.08)" stroke-width="0.5"/><circle cx="50" cy="50" r="30" fill="none" stroke="rgba(201,168,76,0.06)" stroke-width="0.5"/><circle cx="50" cy="50" r="20" fill="none" stroke="rgba(201,168,76,0.04)" stroke-width="0.5"/></svg>');
      background-size: 200px;
      opacity: 0.6;
    }
    .hero-badge {
      position: relative;
      display: inline-block;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      margin-bottom: 20px;
    }
    .hero-title {
      position: relative;
      font-size: 28px;
      font-weight: 800;
      line-height: 1.3;
      margin-bottom: 12px;
      color: #fff;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }
    .hero-title span { color: var(--primary); }
    .hero-sub {
      position: relative;
      font-size: 13px;
      color: rgba(255,255,255,0.75);
      font-weight: 500;
      margin-bottom: 24px;
    }
    .hero-meta {
      position: relative;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
    }
    .hero-meta-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.12);
      padding: 10px 16px;
      border-radius: 25px;
      font-size: 12px;
      color: #fff;
      font-weight: 500;
      border: 1px solid rgba(201,168,76,0.3);
    }
    .hero-meta-item i { color: var(--primary); font-size: 12px; }

    /* ====== 倒计时横幅 ====== */
    .countdown-banner {
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--coral) 100%);
      color: white;
      padding: 18px 24px;
      margin: 16px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 4px 16px rgba(139,105,20,0.25);
    }
    .countdown-main {
      font-size: 16px;
      font-weight: 800;
    }
    .countdown-benefit {
      display: flex;
      justify-content: center;
      gap: 16px;
      font-size: 11px;
      margin-top: 8px;
      opacity: 0.95;
    }
    .countdown-benefit span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* ====== 热度数字 ====== */
    .signup-count {
      background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(240,230,200,0.6));
      padding: 14px 20px;
      margin: 0 16px 16px;
      text-align: center;
      color: var(--primary-dark);
      font-weight: 600;
      font-size: 13px;
      border-left: 4px solid var(--coral);
    }
    .signup-count i { color: var(--coral); margin-right: 6px; }
    .signup-count strong { color: var(--coral); font-size: 18px; }

    /* ====== 图片区块 ====== */
    .pic-section {
      margin: 0 16px 16px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }
    .pic-full {
      width: 100%;
      display: block;
    }

    /* ====== 悬浮报名按钮 ====== */
    .float-btn {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      padding: 14px 32px;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 1px;
      box-shadow: 0 8px 32px rgba(201,168,76,0.5);
      cursor: pointer;
      border: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .float-btn:hover {
      transform: translateX(-50%) translateY(-2px);
      box-shadow: 0 12px 40px rgba(201,168,76,0.6);
    }

    /* ====== 底部一键拨号 ====== */
    .bottom-cta {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, rgba(255,255,255,0.98), rgba(255,255,255,0.95));
      padding: 12px 16px 16px;
      display: flex;
      justify-content: center;
      gap: 12px;
      box-shadow: 0 -4px 24px rgba(0,0,0,0.08);
      z-index: 99;
    }
    .bottom-cta-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      box-shadow: 0 6px 20px rgba(201,168,76,0.35);
    }

    /* ====== 底部 ====== */
    .footer {
      text-align: center;
      padding: 24px 20px 120px;
      color: var(--text-light);
      font-size: 11px;
      line-height: 1.8;
      background: rgba(255,255,255,0.5);
      margin-top: 8px;
    }

    ::-webkit-scrollbar { width: 0; background: transparent; }
  </style>
</head>
<body>

<div class="container">

  <!-- HERO 主视觉 -->
  <div class="hero">
    <div class="hero-badge">2026 华中首届</div>
    <h1 class="hero-title">疗愈生态<span>博览会</span></h1>
    <div class="hero-sub">疗愈 · 生态 · 共生</div>
    <div class="hero-meta">
      <div class="hero-meta-item">
        <i class="fas fa-calendar"></i> 6月18-20日
      </div>
      <div class="hero-meta-item">
        <i class="fas fa-map-marker-alt"></i> 长沙芒果馆
      </div>
      <div class="hero-meta-item">
        <i class="fas fa-layer-group"></i> 5大展区
      </div>
    </div>
  </div>

  <!-- 倒计时 -->
  <div class="countdown-banner">
    <div class="countdown-main">🎉 早鸟优惠 · 4月30日截止</div>
    <div class="countdown-benefit">
      <span><i class="fas fa-users"></i> 精准客流</span>
      <span><i class="fas fa-award"></i> 政府背书</span>
      <span><i class="fas fa-handshake"></i> 产业对接</span>
    </div>
  </div>

  <!-- 热度 -->
  <div class="signup-count">
    <i class="fas fa-fire"></i> 已有 <strong>23</strong> 家品牌确认参展，展位火热预订中
  </div>

  <!-- 图片板块 -->
  <div class="pic-section">
    <img src="展会概况.png" alt="展会概况" class="pic-full">
  </div>

  <div class="pic-section">
    <img src="时间地点.png" alt="时间地点" class="pic-full">
  </div>

  <div class="pic-section">
    <img src="为什么选择我们.png" alt="为什么选择我们" class="pic-full">
  </div>

  <div class="pic-section">
    <img src="展区规划.png" alt="展区规划" class="pic-full">
  </div>

  <div class="pic-section">
    <img src="展区活动.png" alt="展区活动" class="pic-full">
  </div>

  <div class="pic-section">
    <img src="展位定价.png" alt="展位定价" class="pic-full">
  </div>

  <div class="pic-section">
    <img src="流程图.png" alt="参展流程" class="pic-full">
  </div>

  <!-- 底部 -->
  <div class="footer">
    <p>主办：湖南会展集团有限责任公司</p>
    <p>湖南易展科技有限公司 · 湖南优胜国际会展有限公司</p>
    <p style="margin-top:12px;">© 2026 All Rights Reserved</p>
  </div>

</div>

<!-- 悬浮报名按钮 -->
<a href="javascript:void(0)" class="float-btn" onclick="goToForm()">
  <i class="fas fa-paper-plane"></i> 立即报名
</a>

<!-- 底部一键拨号 -->
<div class="bottom-cta">
  <a href="tel:13973186313" class="bottom-cta-item">
    <i class="fas fa-phone-alt"></i> 立即咨询
  </a>
</div>

<script>
  // 腾讯文档收集表链接 - 请替换成你的收集表链接
  var formUrl = 'https://docs.qq.com/form/DXXXXX'; // TODO: 替换为你的收集表链接

  function goToForm() {
    // 品牌商跳转收集表
    window.location.href = formUrl;
  }

  // 点击底部咨询也跳转收集表
  document.querySelector('.bottom-cta-item').addEventListener('click', function(e) {
    // 如果用户选择联系顾问，保持电话功能；如果想跳转表单，去掉这行
  });
</script>

</body>
</html>
